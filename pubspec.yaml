name: smena
description: SMENA — same-day shift work marketplace (Belarus).
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management — SMENA_ARCHITECTURE §2.3
  flutter_riverpod: ^2.5.1

  # Routing — SMENA_ARCHITECTURE §2.4
  go_router: ^14.2.0

  # Networking (non-Supabase calls only, e.g. future payment/geocoding adapters)
  dio: ^5.4.3+1

  # Backend — connected Supabase project (Postgres + Auth + Realtime + Storage)
  supabase_flutter: ^2.5.6

  # Env / secrets — never hardcode SUPABASE_URL / SUPABASE_ANON_KEY
  flutter_dotenv: ^5.1.0

  # Local storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # Typography — Inter only, SMENA_DESIGN_SYSTEM §1 / SMENA_BRAND_BOOK §8
  google_fonts: ^6.2.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
